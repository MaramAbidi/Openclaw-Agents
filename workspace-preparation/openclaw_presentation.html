<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Presentation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .slide {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            box-sizing: border-box;
            position: absolute;
            top: 0;
            left: 100%;
            background-color: #f0f0f0;
            transition: left 0.5s ease-in-out;
        }
        .current {
            left: 0;
        }
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }
        .controls button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 0 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="slide current" id="slide1">
        <h1>Bonjour from OpenClaw Presentation</h1>
    </div>
    <div class="slide" id="slide2">
        <h1>Le volume de préparation par magasin</h1>
    </div>

    <div class="controls">
        <button onclick="prevSlide()">Previous</button>
        <button onclick="nextSlide()">Next</button>
    </div>

    <script>
        let currentSlide = 1;
        const totalSlides = 2;

        function showSlide(n) {
            const slides = document.querySelectorAll('.slide');
            slides.forEach(slide => slide.classList.remove('current'));
            slides[n - 1].classList.add('current');
        }

        function nextSlide() {
            currentSlide = currentSlide < totalSlides ? currentSlide + 1 : 1;
            showSlide(currentSlide);
        }

        function prevSlide() {
            currentSlide = currentSlide > 1 ? currentSlide - 1 : totalSlides;
            showSlide(currentSlide);
        }

        showSlide(currentSlide);
    </script>
</body>
</html>
